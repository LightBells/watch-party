<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 280px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            background: #f8f9fa;
            margin: 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            margin: 0 0 8px 0;
            color: #333;
            font-size: 20px;
            font-weight: 600;
        }
        
        .header p {
            margin: 0;
            color: #666;
            font-size: 12px;
        }
        
        .username-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 13px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #007bff;
        }
        
        .char-count {
            text-align: right;
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .radio-group {
            display: flex;
            gap: 12px;
        }

        .radio-option {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #333;
            font-size: 13px;
            cursor: pointer;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }
        
        .btn:hover {
            background: #0056b3;
        }
        
        .btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 12px;
            text-align: center;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .info-section {
            background: #e3f2fd;
            padding: 16px;
            border-radius: 8px;
            font-size: 12px;
            color: #1565c0;
            line-height: 1.4;
        }
        
        .info-section strong {
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Watch Party</h1>
        <p>ユーザーネーム設定</p>
    </div>
    
    <div id="username-status" class="status success" style="display: none;">
        ユーザーネームが保存されました
    </div>
    
    <div class="username-section">
        <div class="input-group">
            <label for="username">ユーザーネーム</label>
            <input type="text" id="username" placeholder="ユーザーネームを入力" maxlength="20">
            <div class="char-count">
                <span id="char-count">0</span>/20
            </div>
        </div>
        <div class="input-group">
            <label>チャット表示位置</label>
            <div class="radio-group">
                <label class="radio-option" for="chat-display-overlay">
                    <input type="radio" id="chat-display-overlay" name="chat-display-mode" value="overlay" checked>
                    <span>overlay</span>
                </label>
                <label class="radio-option" for="chat-display-sidebar">
                    <input type="radio" id="chat-display-sidebar" name="chat-display-mode" value="sidebar">
                    <span>sidebar</span>
                </label>
            </div>
        </div>
        <button id="save-username" class="btn" disabled>保存</button>
    </div>
    
    <div class="info-section">
        <strong>使い方:</strong>
        ルームの参加・作成は動画ページの右上のボタンから行えます。
        コメントは画面下部の入力欄から送信できます。
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
